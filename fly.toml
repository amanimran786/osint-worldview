# fly.toml app configuration file generated for osint-worldview on 2026-03-01T11:46:54-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'osint-worldview'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[env]
  AI_ENABLED = 'false'
  CORS_ORIGINS = '*'
  DATABASE_URL = 'sqlite:////data/osint_worldview.db'
  ENV = 'production'

[[mounts]]
  source = 'osint_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
