# Render.com Blueprint — https://render.com/docs/infrastructure-as-code
# Deploy: connect your GitHub repo at https://dashboard.render.com
# This uses the root Dockerfile (multi-stage: frontend build + backend serve)

services:
  - type: web
    name: osint-worldview
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    healthCheckPath: /api/health/live
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:////app/osint_worldview.db
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: AI_ENABLED
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
